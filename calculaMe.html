<!DOCTYPE html>
<html lang="en">
<head>
   <style>
    body{
        transition: all 1s;
    }
#back{
    border: 3px solid;
    display: grid;
    grid-template-columns: 60px 60px 60px 60px;
    grid-template-rows:  60px 60px 60px 60px 60px 60px;
    width: 260px;
    gap:5px;
    justify-content: space-around;
    background-color: black;
    transition: all 1s;
}
#back div{
    cursor: pointer;
    border: 2px solid white;
    text-align: center;
    line-height: 30px;
    font-size: 25px;
    background-color: orange;
    color: white;
}
#show{
       grid-column: 1/5;
       grid-row: 1/2;
       border: 2px solid;
}
.plus{
    grid-column: 4/5;
    grid-row: 3/5;
}
.egale{
    grid-row: 5/7;
    grid-column: 4/5;
}
.zero{
    grid-row: 6/7;
    grid-column: 1/3;
}
img{
    cursor: pointer;
    width: 50px;
    height: 50px;
    float:right;
    margin-top: -400px;
    transition: all 1s;
}
img:hover{
    opacity:0.5;
}

   </style>
</head>
<body>
<div id="back">
   <input type="text" id="show">
   <div class="supp">Supp</div>
   <div class="quation">/</div>
   <div class="foi">*</div>
   <div class="moin">-</div>
   <div class="seven">7</div>
   <div class="eight">8</div>
   <div class="nine">9</div>
   <div class="plus">+</div>
   <div class="four">4</div>
   <div class="five">5</div>
   <div class="six">6</div>
   <div class="one">1</div>
   <div class="two">2</div>
   <div class="tree">3</div>
   <div class="egale">=</div>
   <div class="zero">0</div>
   <div class="point">.</div>
</div>
<img src="https://img.freepik.com/premium-vector/moon-stars-icon-yellow-isolated-black-flat-vector-illustration-half-moon-with-stars_615232-319.jpg">

    <script>
let buttons=document.getElementById("back").children;
let valshow=buttons[0];
buttons[1].addEventListener("click",function(){
         valshow.value=valshow.value.slice(0,-1);
})
buttons[2].addEventListener("click",function(){
         valshow.value+="/";
})
buttons[3].addEventListener("click",function(){
         valshow.value+="*";
})
buttons[4].addEventListener("click",function(){
         valshow.value+="-";
})
buttons[5].addEventListener("click",function(){
         valshow.value+="7";
})
buttons[6].addEventListener("click",function(){
         valshow.value+="8";
})
buttons[7].addEventListener("click",function(){
         valshow.value+="9";
})
buttons[8].addEventListener("click",function(){
         valshow.value+="+";
})
buttons[9].addEventListener("click",function(){
         valshow.value+="4";
})
buttons[10].addEventListener("click",function(){
         valshow.value+="5";
})
buttons[11].addEventListener("click",function(){
         valshow.value+="6";
})
buttons[12].addEventListener("click",function(){
         valshow.value+="1";
})
buttons[13].addEventListener("click",function(){
         valshow.value+="2";
})
buttons[14].addEventListener("click",function(){
         valshow.value+="3";
})
buttons[16].addEventListener("click",function(){
         valshow.value+="0";
})
buttons[17].addEventListener("click",function(){
         valshow.value+=".";
})
buttons[15].addEventListener("click",function(){
         valshow.value=eval(valshow.value);
})


let ns=document.querySelector("img");
ns.addEventListener("click",function(){
    if(document.body.style.backgroundColor!="black"){
    ns.src="https://www.sunisthefuture.net/wp-content/uploads/2015/02/Sun-Symbol.png";
    document.body.style.backgroundColor="black";
    document.getElementById("back").style.border="3px solid white";
    }
    else{
        ns.src="https://img.freepik.com/premium-vector/moon-stars-icon-yellow-isolated-black-flat-vector-illustration-half-moon-with-stars_615232-319.jpg";
        document.body.style.backgroundColor="white";
        document.getElementById("back").style.border="3px solid";
    }
}
)
    </script>
</body>
</html>
