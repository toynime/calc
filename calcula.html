<!DOCTYPE html>
<html lang="en">
<head>
   <style>
#back{
    border: 3px solid;
    display: grid;
    grid-template-columns: 60px 60px 60px 60px;
    grid-template-rows:  60px 60px 60px 60px 60px 60px;
    width: 260px;
    gap:5px;
    justify-content: space-around;
    background-color: black;
}
#back div{
    cursor: pointer;
    border: 2px solid white;
    text-align: center;
    line-height: 30px;
    font-size: 25px;
    background-color: orange;
    color: white;
}
#show{
       grid-column: 1/5;
       grid-row: 1/2;
       border: 2px solid;
    position:relative:
}
.plus{
    grid-column: 4/5;
    grid-row: 3/5;
}
.egale{
    grid-row: 5/7;
    grid-column: 4/5;
}
.zero{
    grid-row: 6/7;
    grid-column: 1/3;
}
#span{
        color: black;
        position:absolute;
        top:7px;
        font-size:15px;
        opacity: 0.5;
        left: 15px;
}

   </style>
</head>
<body>
<div id="back">
   <input type="text" id="show">
   <div onclick="supp()">C<span id="span"></span></div>
    <div onclick="operation(2)">/</div>
    <div onclick="operation(3)">*</div>
    <div onclick="operation(4)">-</div>

    <div onclick="addnumber(5)">7</div>
    <div onclick="addnumber(6)">8</div>
    <div onclick="addnumber(7)">9</div>
    <div onclick="operation(8)" class="plus">+</div>

    <div onclick="addnumber(9)">4</div>
    <div onclick="addnumber(10)">5</div>
    <div onclick="addnumber(11)">6</div>

    <div onclick="addnumber(12)">1</div>
    <div onclick="addnumber(13)">2</div>
    <div onclick="addnumber(14)">3</div>

    <div onclick="calculate()" class="egale">=</div>
    <div onclick="addnumber(16)" class="zero">0</div>
    <div onclick="addnumber(17)">.</div>
</div>

    <script>
buttons=document.getElementById("back").children;
let input=buttons[0];
let t=true;
let o=0;
let n=0;
let numb=[];
let oper=[];
input.value="";
let holder=document.getElementById("span");
function addnumber(i){
    if(t==false){
        input.value="";
    }
      input.value+=buttons[i].innerHTML;
      holder.innerHTML+=buttons[i].innerHTML;
      numb[n]=Number(input.value);
      t=true;
}
function operation(i){
    if(numb.length-oper.length==1){
    holder.innerHTML+=buttons[i].innerHTML;
    oper[o]=buttons[i].innerHTML;
    o++;n++;
    t=false;
}
}
function supp(){
    input.value=input.value.slice(0,-1);
    holder.innerHTML=holder.innerHTML.slice(0,-1);
    numb[n]=Number(input.value);
    if(!numb[n]){
        oper[o]="";
        o--;
        n--;
        

    } 
    }
function calculate(){
        if(numb.length-oper.length==1){
            o=0;n=0;let j=1;let res=numb[0];input.value="";
            for(let u=0;u<oper.length;u++){
                if(oper[u]=="*"){
                   numb[u] = numb[u] * numb[u + 1];
                   numb.splice(u + 1, 1);
                   oper.splice(u, 1);
                   u--;
                }
            }
              for(let i=0;i<oper.length;i++){
                  if(oper[i]=="+"){
                    res+=numb[j];
                    j++
                     input.value=res;
                  }
                  if(oper[i]=="-"){
                    res-=numb[j];
                    j++
                     input.value=res;
                  }
              }

        }

}




    </script>
</body>
</html>
